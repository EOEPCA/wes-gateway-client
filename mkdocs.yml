site_name: WES API Client
site_url: https://EOEPCA.github.io/wes-gateway-client/
site_author: Fabrice Brito, Simone Tripodi
repo_url: https://github.com/EOEPCA/wes-gateway-client/
repo_name: EOEPCA/wes-gateway-client

theme:
  name: material

  palette:
  - media: "(prefers-color-scheme: light)"
    scheme: default
    toggle:
      icon: material/toggle-switch-off-outline
      name: Switch to dark mode
  - media: "(prefers-color-scheme: dark)"
    scheme: slate
    toggle:
      icon: material/toggle-switch
      name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - pymdownx.details
  - abbr
  - admonition
  - footnotes
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - attr_list
  - pymdownx.snippets:
      base_path: './'
  - pymdownx.highlight:
      line_spans: __span

nav:
  - Home: index.md
  - Tutorials:
      - Submit your first workflow run: tutorials/first-workflow-run.md
  - How-to guides:
      - Configure a client: how-to/configure-client.md
      - Submit workflows: how-to/submit-workflows.md
      - Monitor workflow runs: how-to/monitor-runs.md
  - Reference:
      - Client API: reference/client.md
      - Workflow run API: reference/workflow-runs.md
      - Models: reference/models.md
  - Explanation:
      - Client model and WES flow: explanation/client-model.md

copyright: <a href="https://www.apache.org/licenses/LICENSE-2.0"><img src="https://img.shields.io/badge/license-Apache%20License%202.0-blue" alt="Apache License, Version 2.0" /></a>
